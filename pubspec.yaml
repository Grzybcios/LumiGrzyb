name: lumigrzyb
description: LumiGrzyb — Philips Hue controller (Flutter Desktop)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_acrylic: ^1.1.4
  # Persisted configuration is stored in config.json; keep shared_preferences
  shared_preferences: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/lumigrzyb.png

# Ikony aplikacji generowane z logo:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icons/lumigrzyb.png"
  windows:
    generate: true
    image_path: "assets/icons/lumigrzyb.png"
    icon_size: 256
